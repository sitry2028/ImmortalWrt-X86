name: OpenWrt-X86-Stable

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: openwrt-23.05.4

  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Init environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3 rsync unzip zlib1g-dev file wget curl ccache qemu-utils libelf-dev

        sudo timedatectl set-timezone "$TZ"

    - name: Clone source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    # =========================
    # feeds（稳定模式）
    # =========================
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a | tee feeds_update.log

    - name: Install feeds
      run: |
        cd openwrt
        ./scripts/feeds install -a | tee feeds_install.log || true

    # =========================
    # DIY 脚本
    # =========================
    - name: Load custom scripts
      run: |
        chmod +x $DIY_P1_SH $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH || true

    # =========================
    # config
    # =========================
    - name: Load config
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config

        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

        make defconfig

    # =========================
    # download（稳定模式）
    # =========================
    - name: Download packages
      run: |
        cd openwrt
        make download -j4 || true

    # =========================
    # compile（关键稳定点）
    # =========================
    - name: Compile firmware
      run: |
        cd openwrt
        make -j2 V=s || make -j1 V=s

    # =========================
    # artifacts
    # =========================
    - name: Prepare artifacts
      run: |
        echo "FIRMWARE_PATH=openwrt/bin/targets/x86/64" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-X86-Stable
        path: openwrt/bin/targets/x86/64/

    # =========================
    # release
    # =========================
    - name: Release firmware
      uses: softprops/action-gh-release@v2
      if: env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_id }}
        files: openwrt/bin/targets/x86/64/*
