name: ImmortalWrt-X86-Industrial

on:
  repository_dispatch:
  workflow_dispatch:

env:
  # =========================
  # 工业级稳定源码（推荐）
  # =========================
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-23.05

  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # 工业级依赖环境（稳定编译关键）
    # =========================
    - name: Init environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses5-dev libncursesw5-dev \
          libssl-dev python3 python3-distutils \
          rsync unzip zlib1g-dev file wget curl \
          ccache qemu-utils

        sudo timedatectl set-timezone "$TZ"

    # =========================
    # 拉源码（稳定锁定）
    # =========================
    - name: Clone source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    # =========================
    # feeds（工业稳定模式：允许失败但不终止）
    # =========================
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a

    - name: Install feeds
      run: |
        cd openwrt
        ./scripts/feeds install -a || true

    # =========================
    # DIY Part1
    # =========================
    - name: Load custom feeds
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH || true

    # =========================
    # 配置文件
    # =========================
    - name: Load config
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config

        chmod +x $DIY_P2_SH

        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

        make defconfig

    # =========================
    # 下载依赖（防炸）
    # =========================
    - name: Download packages
      run: |
        cd openwrt
        make download -j8 || true

    # =========================
    # 工业级编译（关键优化点）
    # =========================
    - name: Compile firmware
      run: |
        cd openwrt
        make -j1 V=s || make -j1 V=sc

    # =========================
    # 输出固件
    # =========================
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-X86-Industrial
        path: openwrt/bin/targets/x86/64/
