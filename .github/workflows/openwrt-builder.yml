name: ImmortalWrt-X86

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-23.05

  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo apt-get update

        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3 rsync unzip zlib1g-dev file wget curl ccache qemu-utils

        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Load custom feeds (SAFE MODE)
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH || true

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a || true

    - name: Install feeds
      run: |
        cd openwrt
        ./scripts/feeds install -a || true

    - name: Load configuration
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config

        chmod +x $DIY_P2_SH

        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8 || true

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Prepare artifacts
      run: |
        cd openwrt/bin/targets/x86/64
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-X86
        path: openwrt/bin/targets/x86/64/

    - name: Release firmware
      uses: softprops/action-gh-release@v2
      if: env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_id }}
        files: openwrt/bin/targets/x86/64/*
