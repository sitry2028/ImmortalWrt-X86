name: ImmortalWrt-X86-Industrial

on:
  repository_dispatch:
  workflow_dispatch:

env:
  # =========================
  # 工业级稳定源码
  # =========================
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-23.05

  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    # =========================
    # Checkout
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # 释放磁盘空间（非常关键）
    # =========================
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /opt/hostedtoolcache

        sudo docker image prune -a -f

    # =========================
    # 初始化环境
    # =========================
    - name: Init environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          g++-multilib \
          gettext \
          git \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          python3 \
          python3-distutils \
          rsync \
          unzip \
          zlib1g-dev \
          file \
          wget \
          curl \
          ccache \
          qemu-utils \
          ca-certificates

        sudo timedatectl set-timezone "$TZ"

    # =========================
    # 克隆源码
    # =========================
    - name: Clone source
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    # =========================
    # DIY Part1
    # =========================
    - name: Load custom feeds
      run: |
        chmod +x $DIY_P1_SH

        cd openwrt

        $GITHUB_WORKSPACE/$DIY_P1_SH || true

    # =========================
    # 更新 feeds
    # =========================
    - name: Update feeds
      run: |
        cd openwrt

        ./scripts/feeds clean

        ./scripts/feeds update -a

    # =========================
    # 安装 feeds
    # =========================
    - name: Install feeds
      run: |
        cd openwrt

        ./scripts/feeds install -a

    # =========================
    # 加载配置
    # =========================
    - name: Load config
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config

        chmod +x $DIY_P2_SH

        cd openwrt

        $GITHUB_WORKSPACE/$DIY_P2_SH

        make defconfig

    # =========================
    # 下载源码包
    # =========================
    - name: Download packages
      run: |
        cd openwrt

        make download -j1

        find dl -size -1024c -exec rm -f {} \;

    # =========================
    # 工业级稳定编译
    # =========================
    - name: Compile firmware
      run: |
        cd openwrt

        export FORCE_UNSAFE_CONFIGURE=1
        export MAKEFLAGS="-j1"

        make -j1 V=s

    # =========================
    # 检查固件是否存在
    # =========================
    - name: Check firmware
      run: |
        ls -lh openwrt/bin/targets/x86/64/

    # =========================
    # 上传固件
    # =========================
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-X86-Industrial
        path: openwrt/bin/targets/x86/64/
